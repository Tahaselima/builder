[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/templates"
  to = "/.netlify/functions/api-templates"
  status = 200

[[redirects]]
  from = "/api/templates/*"
  to = "/.netlify/functions/api-templates"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
